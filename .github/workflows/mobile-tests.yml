name: Mobile Tests (Smoke)

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 9 * * *"

concurrency:
  group: mobile-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Tests – Android Emulator
    runs-on: ubuntu-latest

    # ─── Serviço: PostgreSQL ────────────────────────────────────────────────
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ifood_clone
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # ─── Backend ────────────────────────────────────────────────────────
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ifood_clone
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      PORT: 3333
      NODE_ENV: test

      # ─── Testes mobile ─────────────────────────────────────────────────
      APK_PATH: ${{ secrets.APK_PATH || '/tmp/app.apk' }}
      APPIUM_URL: http://127.0.0.1:4723
      API_BASE_URL: http://localhost:3333
      TEST_EMAIL: test@ifood.com
      TEST_PASSWORD: "123456"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout do código
        uses: actions/checkout@v4

      # ── 2. Node.js + backend ─────────────────────────────────────────────
      - name: Instalar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências do backend
        working-directory: backend
        run: npm ci

      - name: Build do backend (TypeScript → JS)
        working-directory: backend
        run: npm run build

      - name: Aplicar migrações Prisma
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Popular banco com dados de seed
        working-directory: backend
        run: npx prisma db seed

      - name: Subir servidor Express em background
        working-directory: backend
        run: |
          npm start &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Aguardar backend responder em /health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3333/health; then
              echo "Backend pronto."
              exit 0
            fi
            echo "Tentativa $i/30 — aguardando..."
            sleep 2
          done
          echo "Backend não respondeu a tempo." && exit 1

      # ── 3. Python + dependências de teste ────────────────────────────────
      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r tests/requirements.txt

      # ── 4. Appium 2.x + driver UiAutomator2 ─────────────────────────────
      - name: Instalar Appium 2
        run: npm install -g appium@latest

      - name: Instalar driver UiAutomator2
        run: appium driver install uiautomator2

      - name: Subir servidor Appium em background
        run: |
          appium --log /tmp/appium.log &
          echo "APPIUM_PID=$!" >> "$GITHUB_ENV"

      - name: Aguardar Appium ficar pronto
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4723/status; then
              echo "Appium pronto."
              exit 0
            fi
            echo "Tentativa $i/30 — aguardando Appium..."
            sleep 2
          done
          echo "Appium não respondeu a tempo." && exit 1

      # ── 5. Emulador Android + testes ─────────────────────────────────────
      - name: Executar testes em emulador Android (API 33)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: test_avd
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            echo "Emulador pronto."
            mkdir -p allure-results reports/screenshots
            pytest tests/ -m smoke \
              --alluredir=allure-results \
              --tb=short \
              -v

      # ── 6. Logs de diagnóstico em caso de falha ──────────────────────────
      - name: Exibir log do Appium (em caso de falha)
        if: failure()
        run: cat /tmp/appium.log || true

      # ── 7. Upload de artefatos ───────────────────────────────────────────
      - name: Upload dos resultados Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload de screenshots de falhas
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: reports/screenshots/
          retention-days: 7

      # ── 8. Relatório Allure no GitHub Pages ──────────────────────────────
      - name: Gerar e publicar relatório Allure no GitHub Pages
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy do relatório Allure no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
